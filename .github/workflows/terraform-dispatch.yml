name: "Terraform Dispatch"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  repository-projects: read
  statuses: read

jobs:
  dispatch-plan:
    name: "Dispatch Terraform Plan"
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/plan')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch plan event
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.createDispatchEvent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                event_type: 'plan',
                client_payload: {
                  pr_number: context.payload.issue.number,
                  comment_id: context.payload.comment.id
                }
              });
              console.log('Successfully dispatched plan event');
            } catch (error) {
              console.error('Failed to dispatch plan event:', error.message);
              throw error;
            }

      - name: Acknowledge command
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: '+1'
              });
            } catch (error) {
              // Ignore reaction errors - they don't affect the main workflow
              console.log('Could not add reaction:', error.message);
            }

  dispatch-apply:
    name: "Dispatch Terraform Apply"
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/apply')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch apply event
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.createDispatchEvent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                event_type: 'apply',
                client_payload: {
                  pr_number: context.payload.issue.number,
                  comment_id: context.payload.comment.id
                }
              });
              console.log('Successfully dispatched apply event');
            } catch (error) {
              console.error('Failed to dispatch apply event:', error.message);
              throw error;
            }

      - name: Acknowledge command
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: '+1'
              });
            } catch (error) {
              // Ignore reaction errors - they don't affect the main workflow
              console.log('Could not add reaction:', error.message);
            }
