name: "Terraform Dispatch"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  repository-projects: read
  statuses: read

jobs:
  dispatch-plan:
    name: "Dispatch Terraform Plan"
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/plan')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Dispatch plan event
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'plan',
              client_payload: {
                pr_number: context.payload.issue.number,
                comment_id: context.payload.comment.id
              }
            });

  dispatch-apply:
    name: "Dispatch Terraform Apply"
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/apply')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Dispatch apply event
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'apply',
              client_payload: {
                pr_number: context.payload.issue.number,
                comment_id: context.payload.comment.id
              }
            });
