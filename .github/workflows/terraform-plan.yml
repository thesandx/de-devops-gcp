name: "Terraform Plan"

on:
  repository_dispatch:
    types: [plan]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (for manual trigger)'
        required: false
        type: string

env:
  TF_VERSION: "1.14.9"
  GCP_PROJECT_ID: ${{ vars.TF_PROJECT_ID || 'de-devops' }}
  GCP_REGION: ${{ vars.TF_REGION || 'asia-southeast1' }}

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      repository-projects: read
      issues: write

    steps:
      - name: "Get PR number"
        id: pr-number
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request) {
              return context.payload.pull_request.number;
            }
            if (context.payload.inputs && context.payload.inputs.pr_number) {
              return context.payload.inputs.pr_number;
            }
            if (context.payload.client_payload && context.payload.client_payload.pr_number) {
              return context.payload.client_payload.pr_number;
            }
            return null;

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-number.outputs.result && format('refs/pull/{0}/head', steps.pr-number.outputs.result) || '' }}

      - name: "Check PR Approval Status"
        id: approval-check
        env:
          PR_NUMBER: ${{ steps.pr-number.outputs.result }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);

            if (!prNumber) {
              console.log('No PR number found, cannot check approval');
              return false;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (pr.state === 'closed') {
              throw new Error('PR is already closed');
            }
            return true;

      - name: Configure ADC
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > /tmp/google_credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/google_credentials.json" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        working-directory: terraform
        run: terraform init -input=false -upgrade
        env:
          GOOGLE_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Terraform Validate
        id: validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/plan_output.txt
          echo "plan_exit_code=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Update PR with Plan Result
        if: always()
        env:
          PR_NUMBER: ${{ steps.pr-number.outputs.result }}
          APPROVAL_CHECK_OUTCOME: ${{ steps.approval-check.outcome }}
          INIT_OUTCOME: ${{ steps.init.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          PLAN_EXIT_CODE: ${{ env.plan_exit_code }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const prNumber = parseInt(process.env.PR_NUMBER);

            if (!prNumber) {
              console.log('No PR number found, skipping PR comment');
              return;
            }

            // Determine if any step failed
            const approvalCheckFailed = process.env.APPROVAL_CHECK_OUTCOME === 'failure';
            const initFailed = process.env.INIT_OUTCOME === 'failure';
            const validateFailed = process.env.VALIDATE_OUTCOME === 'failure';
            const planStepFailed = process.env.PLAN_OUTCOME === 'failure';
            const planExitCode = process.env.PLAN_EXIT_CODE || '1';
            const planFailed = planExitCode !== '0' || approvalCheckFailed || initFailed || validateFailed || planStepFailed;

            // Try to read plan output file
            let planOutput = '';
            let planOutputAvailable = false;
            try {
              planOutput = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
              planOutputAvailable = true;
            } catch (err) {
              console.log('Plan output file not found:', err.message);
            }

            // Format plan output if available
            let formattedPlan = '';
            if (planOutputAvailable) {
              formattedPlan = planOutput.split('\n').map(line => {
                const trimmed = line.trim();
                if (trimmed.startsWith('+ ')) {
                  return '+' + line.replace('+', ' ');
                } else if (trimmed.startsWith('- ')) {
                  return '-' + line.replace('-', ' ');
                } else if (trimmed.startsWith('~ ')) {
                  return '!' + line.replace('~', ' ');
                }
                return ' ' + line;
              }).join('\n');
            }

            let commentBody = `## Terraform Plan Summary\n\n`;
            if (planFailed) {
              commentBody += `❌ **Terraform Plan Failed**\n\n`;
              // Add details about which step failed
              if (approvalCheckFailed) {
                commentBody += `- **PR Approval Check Failed**: PR is already closed or not approved.\n`;
              }
              if (initFailed) {
                commentBody += `- **Terraform Init Failed**: Failed to initialize Terraform.\n`;
              }
              if (validateFailed) {
                commentBody += `- **Terraform Validate Failed**: Configuration validation failed.\n`;
              }
              if (planStepFailed || planExitCode !== '0') {
                commentBody += `- **Terraform Plan Failed**: Plan generation encountered errors.\n`;
              }
              commentBody += `\nPlease review the workflow logs for detailed error messages.\n\n`;
              if (planOutputAvailable) {
                commentBody += `<details><summary>Plan Output</summary>\n\n`;
                commentBody += `\`\`\`diff\n${formattedPlan}\n\`\`\`\n</details>`;
              } else {
                commentBody += `*Plan output unavailable.*\n`;
              }
            } else {
              commentBody += `✅ **Terraform Plan Successful**\n\n`;
              commentBody += `The terraform plan completed successfully. You can now review the changes.\n\n`;
              if (planOutputAvailable) {
                commentBody += `<details><summary>Plan Output</summary>\n\n`;
                commentBody += `\`\`\`diff\n${formattedPlan}\n\`\`\`\n</details>\n\n`;
              } else {
                commentBody += `*Plan output unavailable.*\n\n`;
              }
              commentBody += `**Next Steps:**\n`;
              commentBody += `1. Review the plan above\n`;
              commentBody += `2. The PR will be automatically approved upon successful plan\n`;
              commentBody += `3. Comment \`/apply\` to run terraform apply`;
            }

            // Get existing comments
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const planComment = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Terraform Plan Summary')
            );

            if (planComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: planComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

            // Update PR title with emoji
            const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
            });
            let currentTitle = pr.title;
            // Remove leading emojis and trim
            const cleanedTitle = currentTitle.replace(/^[✅❌]\s*/, '').trim();
            const newTitle = planFailed ? `❌ ${cleanedTitle}` : `✅ ${cleanedTitle}`;
            if (currentTitle !== newTitle) {
                await github.rest.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    title: newTitle,
                });
                console.log(`Updated PR title to: ${newTitle}`);
            } else {
                console.log('PR title already up to date');
            }

            // If plan failed, request changes via PR review
            if (planFailed) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'REQUEST_CHANGES',
                body: `❌ **Terraform Plan Failed**\n\nThis PR cannot be merged until the terraform plan succeeds.\n\nPlease fix the errors and re-run \`/plan\` to generate a new plan.`
              });
            }

      - name: Fail if plan failed
        if: env.plan_exit_code != '0'
        run: |
          echo "Terraform plan failed with exit code $plan_exit_code"
          exit 1

      - name: Auto Approve PR on Successful Plan
        if: env.plan_exit_code == '0'
        env:
          PR_NUMBER: ${{ steps.pr-number.outputs.result }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);

            if (!prNumber) {
              console.log('No PR number found, skipping auto-approve');
              return;
            }

            // Check if PR is already approved
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const alreadyApproved = reviews.data.some(r => r.state === 'APPROVED');

            if (alreadyApproved) {
              console.log('PR is already approved, skipping auto-approve');
              return;
            }

            const fs = require('fs');
            let planOutput = '';
            let planOutputAvailable = false;
            try {
              planOutput = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
              planOutputAvailable = true;
            } catch (err) {
              console.log('Plan output file not found:', err.message);
            }

            let formattedPlan = '';
            if (planOutputAvailable) {
              formattedPlan = planOutput.split('\n').map(line => {
                const trimmed = line.trim();
                if (trimmed.startsWith('+ ')) {
                  return '+' + line.replace('+', ' ');
                } else if (trimmed.startsWith('- ')) {
                  return '-' + line.replace('-', ' ');
                } else if (trimmed.startsWith('~ ')) {
                  return '!' + line.replace('~', ' ');
                }
                return ' ' + line;
              }).join('\n');
            }

            const approvalBody = planOutputAvailable
              ? `✅ **Terraform Plan Approved**\n\n<details><summary>Plan Output</summary>\n\n\`\`\`diff\n${formattedPlan}\n\`\`\`\n</details>\n\nThis PR has been automatically approved after a successful terraform plan.`
              : `✅ **Terraform Plan Approved**\n\nThis PR has been automatically approved after a successful terraform plan.\n\n*Plan output unavailable.*`;

            // Auto approve the PR
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'APPROVE',
              body: approvalBody
            });

            console.log('PR automatically approved');
